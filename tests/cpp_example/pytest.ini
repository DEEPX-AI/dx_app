[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
markers =
    cli: CLI argument tests
    help: Help option tests
    e2e: End-to-end integration tests
    visualization: C++ visualization output tests (build+run+image check)
    async_exec: Tests for async executables
    sync_exec: Tests for sync executables
    save_mode: Tests for --save and --save-dir output
    dump_tensors: Tests for --dump-tensors tensor debugging
    verify: Tests for DXAPP_VERIFY numerical verification
    multi_loop: Tests for multi-loop (-l N) video processing
    signal_handling: Tests for graceful SIGINT shutdown
    e2e_image: E2E image inference tests
    e2e_stream: E2E stream (video) inference tests
    e2e_short: Short E2E test suite (20 representative models, used with --e2e-short)
