[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = 
    --verbose
    --tb=short
    --strict-markers
    -W ignore::DeprecationWarning
    --cov=../../src/python_example
    --cov-report=term-missing:skip-covered
    --cov-report=html:../../htmlcov
    --cov-config=../../.coveragerc

markers =
    unit: Unit test
    integration: Integration test
    cli: CLI ArgumentParser test
    e2e: E2E test
    visualization: Visualization output test
    efficientnet: EfficientNet model test
    scrfd: SCRFD model test
    scrfd_ppu: SCRFD_PPU model test
    yolov5: YOLOv5 model test
    yolov5_ppu: YOLOv5_PPU model test
    yolov5face: YOLOv5Face model test
    yolov5pose: YOLOv5Pose model test
    yolov5pose_ppu: YOLOv5Pose_PPU model test
    yolov7: YOLOv7 model test
    yolov7_ppu: YOLOv7_PPU model test
    yolov8: YOLOv8 model test
    yolov8seg: YOLOv8Seg model test
    yolov9: YOLOv9 model test
    yolov10: YOLOv10 model test
    yolov11: YOLOv11 model test
    yolov12: YOLOv12 model test
    yolov26: YOLOv26 model test
    yolov26cls: YOLOv26Cls model test
    yolov26pose: YOLOv26Pose model test
    yolov26seg: YOLOv26Seg model test
    yolov26obb: YOLOv26Obb model test
    yolox: YOLOX model test
    deeplabv3: DeepLabv3 model test
    scrfd2_5g: SCRFD2_5G model test
    scrfd10g: SCRFD10G model test
    yolov5m_face: YOLOv5m face model test
    yolov7_face: YOLOv7 face model test
    yolov7s_face: YOLOv7s face model test
    yolov7_w6_face: YOLOv7 W6 face model test
    yolov7_w6_tta_face: YOLOv7 W6 TTA face model test
    retinaface: RetinaFace model test
    yolov5n: YOLOv5n model test
    yolov5m: YOLOv5m model test
    yolov5l: YOLOv5l model test
    yolov5s_ppu: YOLOv5s PPU model test
    yolov7tiny: YOLOv7Tiny model test
    yolov8s: YOLOv8s model test
    yolov9c: YOLOv9c model test
    yolo26n: YOLOv26n model test
    yolox_leaky: YOLOX Leaky model test
    nanodet: NanoDet model test
    damoyolo: DAMO-YOLO model test
    ssdmv1: SSD MobileNet model test
    yolov8m_pose: YOLOv8m pose model test
    yolov8s_pose: YOLOv8s pose model test
    yolov5s_seg: YOLOv5s seg model test
    yolov8s_seg: YOLOv8s seg model test
    bisenetv1: BiSeNetV1 model test
    bisenetv2: BiSeNetV2 model test
    segformer: SegFormer model test
    fastdepth: FastDepth model test
    fastdepth_1: FastDepth_1 model test
    arcface: ArcFace model test
    osnet: OSNet model test
    dncnn: DnCNN model test
    zero_dce: Zero-DCE model test
    espcn: ESPCN model test
    hand_landmark: Hand Landmark model test
    alexnet: AlexNet model test
    mobilenetv2: MobileNetV2 model test
    resnet50: ResNet50 model test
    yolo26n_obb: YOLOv26n OBB model test

filterwarnings =
    ignore::DeprecationWarning
