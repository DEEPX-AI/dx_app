[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    --strict-markers
    -W ignore::DeprecationWarning

markers =
    cli: CLI argument tests
    help: --help option tests
    e2e: End-to-end inference tests (real hardware required)
    e2e_image: E2E image inference tests
    e2e_stream: E2E stream/video inference tests
    save_mode: --save / --save-dir output tests
    dump_tensors: --dump-tensors tensor debugging tests
    multi_loop: --loop N multi-iteration tests
    signal_handling: SIGINT graceful shutdown tests
    verify: DXAPP_VERIFY numerical verification tests
    visualization: Visualization output tests (run + image verification)
    async_exec: Tests for async scripts
    sync_exec: Tests for sync scripts
    unit: Unit tests (framework-based, class-based scripts)
    e2e_short: Short E2E test suite (20 representative models, used with --e2e-short)

filterwarnings =
    ignore::DeprecationWarning
